<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PillFlow</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#07090f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PillFlow"/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#07090f;--surface:#0f1319;--surface2:#161c26;--surface3:#1d2535;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
  --t1:#f2f5ff;--t2:#7f8ea8;--t3:#3f4e68;
  --blue:#4d84ff;--blue-dim:rgba(77,132,255,.12);--blue-glow:rgba(77,132,255,.28);
  --green:#18d97a;--green-dim:rgba(24,217,122,.1);--green-glow:rgba(24,217,122,.3);
  --red:#ff4560;--amber:#f5a623;
  --nav:68px;--r:18px;--r-btn:13px;--ff:'Figtree',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;min-height:-webkit-fill-available;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--ff);}
#app{max-width:430px;margin:0 auto;height:100%;min-height:-webkit-fill-available;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav)+24px);}
.scroll::-webkit-scrollbar{display:none;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:54px 22px 14px;flex-shrink:0;background:linear-gradient(to bottom,var(--bg) 70%,transparent);position:sticky;top:0;z-index:30;}
.logo{font-size:19px;font-weight:800;letter-spacing:-.4px;}
.logo em{color:var(--blue);font-style:normal;}
.topbar-actions{display:flex;gap:8px;}
.tbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.tbtn:hover{background:var(--surface3);}
.tbtn svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.tbtn.primary{background:var(--blue-dim);border-color:rgba(77,132,255,.25);}
.tbtn.primary svg{stroke:var(--blue);}

/* PAGE HEAD */
.page-head{padding:0 22px 20px;}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.15;}
.page-sub{font-size:13px;color:var(--t2);margin-top:3px;}

/* HERO */
.hero{margin:0 22px 28px;background:var(--surface);border:1px solid var(--border2);border-radius:22px;overflow:hidden;position:relative;}
.hero-inner{padding:20px;}
.hero-eyebrow{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:16px;}
.hero-eyebrow svg{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.hero-main{display:flex;align-items:flex-start;gap:14px;}
.hero-icon{width:52px;height:52px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--blue-dim);border:1px solid rgba(77,132,255,.18);}
.hero-icon svg{width:24px;height:24px;stroke:var(--blue);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.hero-icon.water{background:rgba(34,200,220,.1);border-color:rgba(34,200,220,.2);}
.hero-icon.water svg{stroke:#22c8dc;}
.hero-icon.food{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2);}
.hero-icon.food svg{stroke:var(--amber);}
.hero-icon.custom{background:rgba(124,92,252,.1);border-color:rgba(124,92,252,.2);}
.hero-icon.custom svg{stroke:#7c5cfc;}
.hero-text{flex:1;}
.hero-name{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.hero-dosage{font-size:13px;color:var(--t2);font-weight:500;margin-top:3px;}
.hero-time-row{margin-top:14px;padding:12px 14px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:space-between;}
.hero-time-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;}
.hero-time-value{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.hero-due-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-dim);border:1px solid rgba(24,217,122,.2);color:var(--green);font-size:12px;font-weight:700;padding:5px 12px;border-radius:99px;}
.hero-due-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pdot 1.5s infinite;}
.hero-note{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px;font-size:12px;color:var(--t2);display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.hero-note svg{width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0;margin-top:1px;}
.hero-cta{margin:16px 20px 20px;background:var(--blue);color:#fff;border:none;width:calc(100% - 40px);padding:14px;border-radius:var(--r-btn);font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px var(--blue-glow);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.hero-cta:hover{transform:translateY(-1px);}
.hero-cta svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* SECTION */
.section{padding:0 22px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-.2px;}
.sec-count{font-size:11px;font-weight:600;color:var(--t3);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:99px;}

/* REMINDER CARDS */
.cards{display:flex;flex-direction:column;gap:8px;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .22s,background .22s;position:relative;cursor:pointer;}
.rcard:hover{background:var(--surface2);}
.rcard.due{background:rgba(24,217,122,.05);border-color:rgba(24,217,122,.22);}
.rcard.flash{background:rgba(24,217,122,.14)!important;border-color:rgba(24,217,122,.4)!important;}
.rcard::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0;background:var(--blue);opacity:.5;}
.rcard.water::before{background:#22c8dc;}
.rcard.food::before{background:var(--amber);}
.rcard.custom::before{background:#7c5cfc;}
.rcard.due::before{background:var(--green);opacity:1;}
.rcard-top{display:flex;align-items:center;gap:12px;}
.rcard-icon{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--blue-dim);}
.rcard-icon.water{background:rgba(34,200,220,.1);}
.rcard-icon.food{background:rgba(245,166,35,.1);}
.rcard-icon.custom{background:rgba(124,92,252,.1);}
.rcard-icon svg{width:20px;height:20px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;stroke:var(--blue);}
.rcard-icon.water svg{stroke:#22c8dc;}
.rcard-icon.food svg{stroke:var(--amber);}
.rcard-icon.custom svg{stroke:#7c5cfc;}
.rcard-meta{flex:1;min-width:0;}
.rcard-name{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rcard-dosage{font-size:12px;color:var(--t2);font-weight:500;margin-top:2px;}
.rcard-status{font-size:12px;color:var(--t2);margin-top:3px;}
.rcard-status.due{color:var(--green);font-weight:600;}
.rcard-ok-btn{width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;background:var(--green-dim);display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
.rcard-ok-btn:hover{background:rgba(24,217,122,.2);}
.rcard-ok-btn svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.rcard-time-row{margin-top:12px;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:11px;}
.rcard-next-label{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.rcard-next-time{font-size:16px;font-weight:700;letter-spacing:-.2px;}
.rcard-interval{font-size:11px;color:var(--t3);}
.rcard-prog{margin-top:10px;}
.prog-track{height:2px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 1s linear;}
.rcard-note{margin-top:10px;font-size:12px;color:var(--t2);display:flex;align-items:flex-start;gap:7px;line-height:1.4;}
.rcard-note svg{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0;margin-top:2px;}
.rcard-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);gap:8px;}
.rcard.expanded .rcard-expand{display:flex;}
.exp-btn{flex:1;padding:10px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;}
.exp-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.exp-btn:hover{background:var(--surface3);}
.exp-btn.danger{color:var(--red);border-color:rgba(255,69,96,.15);background:rgba(255,69,96,.06);}
.exp-btn.danger:hover{background:rgba(255,69,96,.12);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.stat-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.stat-val.g{color:var(--green);}.stat-val.b{color:var(--blue);}.stat-val.p{color:#7c5cfc;}.stat-val.a{color:var(--amber);}
.stat-lbl{font-size:12px;color:var(--t2);margin-top:7px;font-weight:500;}
.hist-list{display:flex;flex-direction:column;gap:7px;}
.hist-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;}
.hist-ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:var(--green-dim);border:1px solid rgba(24,217,122,.15);display:flex;align-items:center;justify-content:center;}
.hist-ico svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hist-info{flex:1;}
.hist-name{font-size:14px;font-weight:700;}
.hist-dose{font-size:11px;color:var(--t3);margin-top:1px;}
.hist-time{font-size:11px;color:var(--t2);margin-top:2px;}

/* SHARE */
.share-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;}
.share-card-title{font-size:16px;font-weight:700;margin-bottom:5px;}
.share-card-sub{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:18px;}
.code-box{background:var(--surface2);border:1px solid var(--border2);border-radius:13px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.code-num{font-size:22px;font-weight:800;letter-spacing:4px;}
.code-copy-btn{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--ff);transition:all .18s;}
.share-row{display:flex;gap:8px;}
.share-btn{flex:1;padding:11px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.share-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.share-btn:hover{background:var(--surface3);color:var(--t1);}

/* CAREGIVER VIEW */
.caregiver-banner{margin:0 22px 16px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.caregiver-banner svg{width:20px;height:20px;stroke:var(--amber);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.caregiver-banner p{font-size:13px;color:var(--amber);font-weight:600;}
.caregiver-banner span{font-size:12px;color:rgba(245,166,35,.6);font-weight:400;display:block;margin-top:2px;}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav);background:rgba(7,9,15,.9);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:1px solid rgba(255,255,255,.055);display:flex;align-items:center;padding:0 12px 6px;z-index:40;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;padding:8px 0 2px;transition:all .2s;position:relative;}
.nav-icon-bg{width:50px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:all .22s cubic-bezier(.22,1,.36,1);}
.nav-btn.on .nav-icon-bg{background:rgba(77,132,255,.15);}
.nav-icon-bg svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.nav-btn.on .nav-icon-bg svg{stroke:var(--blue);}
.nav-lbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.15px;transition:color .2s;}
.nav-btn.on .nav-lbl{color:var(--blue);}
.nav-pip{position:absolute;top:5px;width:4px;height:4px;border-radius:50%;background:transparent;transition:all .22s;}
.nav-btn.on .nav-pip{background:var(--blue);box-shadow:0 0 7px rgba(77,132,255,.8);}

/* OVERLAY / SHEETS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;backdrop-filter:blur(6px);animation:fi .22s;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:78%;max-width:290px;background:#0c1120;border-left:1px solid var(--border2);z-index:101;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideR .3s cubic-bezier(.22,1,.36,1);}
.drawer-head{padding:54px 22px 22px;border-bottom:1px solid var(--border);}
.drawer-av{width:54px;height:54px;border-radius:17px;background:linear-gradient(135deg,var(--blue),#7c5cfc);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.drawer-av svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.drawer-uname{font-size:17px;font-weight:700;}
.drawer-email{font-size:12px;color:var(--t2);margin-top:2px;}
.drawer-section-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);padding:18px 22px 8px;}
.drawer-row{display:flex;align-items:center;gap:13px;padding:12px 22px;cursor:pointer;transition:background .16s;}
.drawer-row:hover{background:rgba(255,255,255,.03);}
.drawer-row-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.drawer-row-icon svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.drawer-row-lbl{font-size:14px;font-weight:500;}
.drawer-row.danger .drawer-row-lbl{color:var(--red);}
.drawer-row.danger .drawer-row-icon svg{stroke:var(--red);}
.drawer-row.danger .drawer-row-icon{background:rgba(255,69,96,.08);border-color:rgba(255,69,96,.15);}
.drawer-foot{margin-top:auto;padding:22px;border-top:1px solid var(--border);}
.drawer-version{font-size:11px;color:var(--t3);text-align:center;}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
.sheet{background:#0c1120;border:1px solid var(--border2);border-top:1px solid rgba(77,132,255,.2);border-radius:24px 24px 0 0;padding:22px 22px 44px;width:100%;max-width:430px;animation:slideUp .3s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet::-webkit-scrollbar{display:none;}
.sheet-handle{width:38px;height:4px;background:rgba(255,255,255,.1);border-radius:99px;margin:0 auto 22px;}
.sheet-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px;}
.sheet-sub{font-size:13px;color:var(--t2);margin-bottom:22px;}
.ltabs{display:flex;gap:3px;background:var(--surface2);border-radius:12px;padding:3px;margin-bottom:20px;}
.ltab{flex:1;padding:9px;border:none;background:transparent;color:var(--t3);font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;transition:all .2s;font-family:var(--ff);}
.ltab.on{background:var(--surface3);color:var(--t1);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:13px 14px;color:var(--t1);font-size:15px;font-family:var(--ff);outline:none;transition:border-color .2s;}
.field input:focus{border-color:rgba(77,132,255,.45);}
.field input::placeholder{color:var(--t3);}
.primary-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-btn);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--ff);margin-top:6px;box-shadow:0 6px 20px var(--blue-glow);transition:all .18s;}
.primary-btn:hover{transform:translateY(-1px);}
.primary-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.or-divider{text-align:center;font-size:12px;color:var(--t3);margin:14px 0;position:relative;}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.or-divider::before{left:0;}.or-divider::after{right:0;}
.ghost-btn{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border2);color:var(--t2);border-radius:var(--r-btn);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:all .18s;}
.ghost-btn:hover{background:var(--surface3);color:var(--t1);}
.error-msg{background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.2);color:var(--red);font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:14px;}

/* ADD SHEET extras */
.add-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:block;}
.add-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.add-row .field{margin-bottom:0;}
.type-grid{display:flex;gap:7px;margin-bottom:16px;}
.type-opt{flex:1;padding:12px 4px 10px;border-radius:13px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s;}
.type-opt svg{width:20px;height:20px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;stroke:var(--t3);}
.type-opt span{font-size:10px;color:var(--t3);font-weight:600;}
.type-opt:hover{background:var(--surface3);}
.type-opt.on{background:var(--blue-dim);border-color:rgba(77,132,255,.3);}
.type-opt.on svg{stroke:var(--blue);}
.type-opt.on span{color:var(--blue);}
.int-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.int-pill{padding:7px 13px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--t3);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--ff);}
.int-pill.on{background:var(--blue-dim);border-color:rgba(77,132,255,.35);color:var(--blue);}
.sound-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:20px;}

// Register Service Worker
async function registerSW(){
  if(!('serviceWorker' in navigator))return;
  try{
    const reg=await navigator.serviceWorker.register('./sw.js',{scope:'./'});
    swReady=true;
    console.log('SW registered');
    // Listen for messages from SW (e.g. confirm reminder from notification)
    navigator.serviceWorker.addEventListener('message',e=>{
      if(e.data&&e.data.type==='CONFIRM_REMINDER') confirmR(e.data.id);
    });
  }catch(err){console.warn('SW registration failed:',err);}
}

// Request notification permission
async function requestNotifPermission(){
  if(!('Notification' in window))return toast('Notificações não suportadas neste navegador','r');
  const result=await Notification.requestPermission();
  notifPermission=result;
  if(result==='granted'){
    toast('Notificações ativadas! 🔔','g');
    sendRemindersToSW();
  } else {
    toast('Permissão negada','r');
  }
  re();
}

// Send reminders schedule to SW
function sendRemindersToSW(){
  if(!swReady||!navigator.serviceWorker.controller)return;
  navigator.serviceWorker.controller.postMessage({
    type:'SCHEDULE_NOTIFICATIONS',
    reminders: R.map(r=>({
      id:r.id, name:r.name, dosage:r.dosage||'',

      next_dose: new Date(r.nextDose).toISOString(),
      interval_hours: r.interval_hours||r.intervalHours,
      sound:r.sound
    }))
  });
}

async function init(){
  if(!CONFIGURED){re();return;}

  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  // check session
  const {data:{session:s}}=await sb.auth.getSession();
  if(s){session=s;await loadProfile();await loadReminders();await loadHistory();}

  // listen for auth changes
  sb.auth.onAuthStateChange(async(event,s)=>{
    session=s;
    if(s){await loadProfile();await loadReminders();await loadHistory();subscribeRealtime();}
    else{profile=null;R=[];H=[];unsubscribeRealtime();}
    re();
  });

  re();
}

async function loadProfile(){
  if(!session)return;
  const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
  if(data)profile=data;
}

async function loadReminders(){
  if(!session)return;
  const{data}=await sb.from("reminders").select("*").eq("user_id",session.user.id).eq("active",true).order("created_at");
  if(data)R=data.map(r=>({...r,nextDose:new Date(r.next_dose).getTime()}));
  sendRemindersToSW();
  re();
}

async function loadHistory(){
  if(!session)return;
  const today=new Date();today.setHours(0,0,0,0);
  const{data}=await sb.from("dose_history").select("*").eq("user_id",session.user.id).gte("taken_at",today.toISOString()).order("taken_at",{ascending:false});
  if(data)H=data.map(h=>({...h,takenAt:new Date(h.taken_at).getTime()}));
  re();
}

function subscribeRealtime(){
  if(realtimeSub||!session)return;
  realtimeSub=sb.channel("pillflow-"+session.user.id)
    .on("postgres_changes",{event:"*",schema:"public",table:"reminders",filter:"user_id=eq."+session.user.id},()=>loadReminders())
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"dose_history",filter:"user_id=eq."+session.user.id},()=>loadHistory())
    .subscribe();
}
function unsubscribeRealtime(){if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}}

      if(r)R=r.map(x=>({...x,nextDose:new Date(x.next_dose).getTime()}));re();
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"dose_history",filter:"user_id=eq."+data.id},async()=>{
      const{data:h}=await sb.from("dose_history").select("*").eq("user_id",data.id).gte("taken_at",today.toISOString()).order("taken_at",{ascending:false});
      if(h)H=h.map(x=>({...x,takenAt:new Date(x.taken_at).getTime()}));re();
    })
    .subscribe();
  re();
}

   AUDIO
   ══════════════════════════════════════════ */
function playAlert(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.0,.18],[659,.2,.18],[784,.38,.28]].forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.22,ctx.currentTime+d+.04);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+dur);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
    if(navigator.vibrate)navigator.vibrate([120,60,120]);
  }catch(e){}
}

async function confirmR(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  const nextDose=new Date(Date.now()+r.intervalHours*36e5);
  fid=id;expandedId=null;
  if(CONFIGURED&&session&&!caregiverMode){
    await sb.from("reminders").update({next_dose:nextDose.toISOString()}).eq("id",id);
    await sb.from("dose_history").insert({user_id:session.user.id,reminder_id:id,name:r.name,dosage:r.dosage||"",type:r.type,taken_at:new Date().toISOString()});
  } else {
    R=R.map(x=>x.id!==id?x:{...x,nextDose:nextDose.getTime()});
    H=[{id:uid(),name:r.name,dosage:r.dosage,type:r.type,takenAt:Date.now()},...H];
  }
  setTimeout(()=>{fid=null;re();},800);
  toast(`${r.name}${r.dosage?" "+r.dosage:""} confirmado`,"g");
  re();
}

async function skipR(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  const nextDose=new Date(Date.now()+r.intervalHours*36e5);
  if(CONFIGURED&&session){
    await sb.from("reminders").update({next_dose:nextDose.toISOString()}).eq("id",id);
  } else {
    R=R.map(x=>x.id!==id?x:{...x,nextDose:nextDose.getTime()});
  }
  expandedId=null;re();
}

async function delR(id){
  if(CONFIGURED&&session){
    await sb.from("reminders").update({active:false}).eq("id",id);
  } else {
    R=R.filter(x=>x.id!==id);
  }
  expandedId=null;re();
}

async function addR(){
  if(!nR.name.trim())return;
  if(CONFIGURED&&session){
    const{data,error}=await sb.from("reminders").insert({
      user_id:session.user.id,
      name:nR.name,dosage:nR.dosage||null,type:nR.type,
      interval_hours:nR.intervalHours,next_dose:new Date().toISOString(),
      note:nR.note||null,sound:nR.sound,active:true
    }).select().single();
    if(error){toast("Erro ao salvar: "+error.message,"r");return;}
    if(data)R=[...R,{...data,nextDose:new Date(data.next_dose).getTime()}];
  } else {
    R=[...R,{...nR,id:uid(),nextDose:Date.now(),interval_hours:nR.intervalHours}];
  }
  nR={name:"",dosage:"",type:"medicine",intervalHours:8,note:"",sound:true};
  addOpen=false;sendRemindersToSW();re();
}

async function doLogin(){
  loginErr="";
  if(!lf.email||!lf.pass){loginErr="Preencha todos os campos";re();return;}
  loading=true;re();
  try{
    let err;
    if(loginMode==="signup"){
      const{error}=await sb.auth.signUp({email:lf.email,password:lf.pass,options:{data:{name:lf.name||lf.email.split("@")[0]}}});
      err=error;
      if(!err)toast("Conta criada! Verifique seu e-mail.","b");
    } else {
      const{error}=await sb.auth.signInWithPassword({email:lf.email,password:lf.pass});
      err=error;
    }
    if(err)loginErr=err.message;
    else{loginOpen=false;lf={name:"",email:"",pass:""};}
  }catch(e){loginErr="Erro de conexão";}
  loading=false;re();
}

async function doLogout(){
  if(sb)await sb.auth.signOut();
  session=null;profile=null;R=[];H=[];caregiverMode=false;caregiverProfile=null;
  drawer=false;re();
}

function toast(msg,cls="g"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className=`toast ${cls} show`;
  setTimeout(()=>t.classList.remove("show"),2600);
}
function copyCode(){

function rcardHTML(r,now,i=0){
  const due=r.nextDose<=now,fl=fid===r.id?" flash":"",exp=expandedId===r.id?" expanded":"";
  const pct=due?100:Math.max(0,100-((r.nextDose-now)/((r.interval_hours||r.intervalHours)*36e5))*100);
  return`<div class="rcard ${r.type}${due?" due":""}${fl}${exp}" data-id="${r.id}" style="animation-delay:${i*.05}s" onclick="expandedId=(expandedId==='${r.id}'?null:'${r.id}');re()">
    <div class="rcard-top">
      <div class="rcard-icon ${r.type}">${I[TYPES[r.type].icon]}</div>
      <div class="rcard-meta">
        <p class="rcard-name">${r.name}</p>
        ${r.dosage?`<p class="rcard-dosage">${r.dosage}</p>`:""}
        <p class="rcard-status${due?" due":""}">${due?"⚡ Está na hora":"⏳ "+cd(r.nextDose-now)}</p>
      </div>
      ${due&&!caregiverMode?`<button class="rcard-ok-btn" onclick="event.stopPropagation();confirmR('${r.id}')">${I.check}</button>`:""}
    </div>
    <div class="rcard-time-row">
      <span class="rcard-next-label">Próxima às</span>
      <span class="rcard-next-time">${ft(r.nextDose)}</span>
      <span class="rcard-interval">a cada ${r.interval_hours||r.intervalHours}h</span>
    </div>
    ${r.note?`<div class="rcard-note">${I.note} ${r.note}</div>`:""}
    <div class="rcard-prog">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${due?"var(--green)":"var(--blue)"}"></div></div>
    </div>
    ${!caregiverMode?`<div class="rcard-expand">
      <button class="exp-btn" onclick="event.stopPropagation();skipR('${r.id}')">${I.skip} Pular dose</button>
      <button class="exp-btn danger" onclick="event.stopPropagation();delR('${r.id}')">${I.trash} Remover</button>
    </div>`:""}
  </div>`;
}

        return`<div class="drawer-row" onclick="tab='${id}';drawer=false;re()"><div class="drawer-row-icon">${icons[i]}</div><span class="drawer-row-lbl">${labels[i]}</span></div>`;
      }).join("")}
      ${!caregiverMode?`<div class="drawer-row" onclick="addOpen=true;drawer=false;re()"><div class="drawer-row-icon">${I.plus}</div><span class="drawer-row-lbl">Novo lembrete</span></div>`:""}
      <p class="drawer-section-lbl">Conta</p>
      ${session
        ?`<div class="drawer-row danger" onclick="doLogout()"><div class="drawer-row-icon">${I.logout}</div><span class="drawer-row-lbl">Sair</span></div>`
        :caregiverMode
          ?`<div class="drawer-row danger" onclick="caregiverMode=false;caregiverProfile=null;R=[];H=[];drawer=false;re()"><div class="drawer-row-icon">${I.logout}</div><span class="drawer-row-lbl">Sair do modo cuidador</span></div>`
          :`<div class="drawer-row" onclick="loginOpen=true;drawer=false;re()"><div class="drawer-row-icon">${I.login}</div><span class="drawer-row-lbl">Entrar / Criar conta</span></div>`
      }
      <div class="drawer-foot"><p class="drawer-version">PillFlow v2.0 • Supabase</p></div>
    </div>
  </div>`;
}

function loginSheetHTML(){
  return`<div class="sheet-overlay" onclick="if(event.target===this){loginOpen=false;loginErr='';re()}">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Bem-vindo</p>
      <p class="sheet-sub">Faça login para salvar seus lembretes</p>
      <div class="ltabs">
        <button class="ltab${loginMode==="login"?" on":""}" onclick="loginMode='login';loginErr='';re()">Entrar</button>
        <button class="ltab${loginMode==="signup"?" on":""}" onclick="loginMode='signup';loginErr='';re()">Criar conta</button>
      </div>
      ${loginErr?`<div class="error-msg">${loginErr}</div>`:""}
      ${loginMode==="signup"?`<div class="field"><label>Nome</label><input id="lf-n" type="text" placeholder="Seu nome" value="${lf.name}"/></div>`:""}
      <div class="field"><label>E-mail</label><input id="lf-e" type="email" placeholder="seu@email.com" value="${lf.email}"/></div>
      <div class="field"><label>Senha</label><input id="lf-p" type="password" placeholder="••••••••" value="${lf.pass}"/></div>
      <button class="primary-btn${loading?" disabled":""}" onclick="doLogin()" ${loading?"disabled":""}>
        ${loading?`<span class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;margin:0 auto;"></span>`
          :loginMode==="login"?"Entrar":"Criar conta"}
      </button>
      <div class="or-divider">ou</div>
      <button class="ghost-btn" onclick="loginOpen=false;loginErr='';re()">Continuar sem conta</button>
    </div>
  </div>`;
}

function addSheetHTML(){
  return`<div class="sheet-overlay" onclick="if(event.target===this){addOpen=false;re()}">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Novo lembrete</p>
      <p class="sheet-sub">Configure os detalhes</p>
      <div class="field"><label>Nome</label><input id="ai-n" placeholder="Ex: Losartana, Vitamina D..." value="${nR.name}"/></div>
      <div class="add-row">
        <div class="field"><label>Dosagem</label><input id="ai-d" placeholder="Ex: 50mg" value="${nR.dosage}"/></div>
        <div class="field"><label>Observação</label><input id="ai-nt" placeholder="Ex: Em jejum" value="${nR.note}"/></div>
      </div>
      <label class="add-label">Tipo</label>
      <div class="type-grid">${Object.entries(TYPES).map(([k,v])=>`
        <div class="type-opt${nR.type===k?" on":""}" onclick="nR.type='${k}';re()">
          ${I[v.icon]}<span>${v.label}</span>
        </div>`).join("")}</div>
      <label class="add-label">Repetir a cada</label>
      <div class="int-pills">${INTERVALS.map(x=>`<button class="int-pill${nR.intervalHours===x?" on":""}" onclick="nR.intervalHours=${x};re()">${x}h</button>`).join("")}</div>
      <div class="sound-row">
        <div class="sound-row-left"><p>Alerta sonoro</p><p>Toca um som quando chegar a hora</p></div>
        <button class="toggle ${nR.sound?"on":"off"}" onclick="nR.sound=!nR.sound;re()"></button>
      </div>
      <div class="sheet-footer">
        <button class="cancel-btn" onclick="addOpen=false;re()">Cancelar</button>
        <button class="confirm-btn" onclick="addR()">Criar →</button>
      </div>
    </div>
  </div>`;
}


function profileSheetHTML(){
  const name=session?profile&&profile.name||session.user.email.split("@")[0]:"Visitante";
  const email=session?session.user.email:"";
  const initials=name.trim().split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
  const taken=H.length, active=R.length;
  const medTaken=H.filter(x=>x.type==="medicine").length;
  const code=(profile&&profile.share_code)||"------";

  if(!session){
    // not logged in — show login prompt
    return`<div class="profile-sheet-overlay" onclick="if(event.target===this){profileOpen=false;re()}">
      <div class="profile-sheet">
        <div class="sheet-handle"></div>
        <div style="text-align:center;padding:8px 0 24px;">
          <div class="profile-avatar-big">${I.user}</div>
          <p class="profile-name">Visitante</p>
          <p class="profile-email">Sem conta — dados temporários</p>
        </div>
        <div class="profile-actions">
          <button class="profile-action-btn" style="background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 6px 20px var(--blue-glow);"
            onclick="profileOpen=false;loginOpen=true;loginMode='login';re()">${I.login} Entrar na conta</button>
          <button class="profile-action-btn" onclick="profileOpen=false;loginOpen=true;loginMode='signup';re()">${I.plus} Criar conta</button>
          <button class="profile-action-btn" onclick="profileOpen=false;re()">${I.check} Continuar sem conta</button>
        </div>
      </div>
    </div>`;
  }

  return`<div class="profile-sheet-overlay" onclick="if(event.target===this){profileOpen=false;re()}">
    <div class="profile-sheet">
      <div class="sheet-handle"></div>
      <div class="profile-avatar-big"><span>${initials}</span></div>
      <p class="profile-name">${name}</p>
      <p class="profile-email">${email}</p>
      <div class="profile-code-row">
        <span style="font-size:11px;color:var(--t3);font-weight:600;">Código:</span>
        <span class="profile-code-badge">${code}</span>
        <button onclick="copyCode()" style="background:none;border:none;cursor:pointer;color:var(--t3);padding:0;">${I.copy.replace('width:18px;height:18px','width:14px;height:14px')}</button>
      </div>
      <div class="profile-stats-row">
        <div class="profile-stat"><p class="profile-stat-val g">${taken}</p><p class="profile-stat-lbl">Hoje</p></div>
        <div class="profile-stat"><p class="profile-stat-val b">${active}</p><p class="profile-stat-lbl">Ativos</p></div>
        <div class="profile-stat"><p class="profile-stat-val p">${medTaken}</p><p class="profile-stat-lbl">Remédios</p></div>
      </div>
      <div class="profile-actions">
        <button class="profile-action-btn" onclick="profileOpen=false;tab='share';re()">${I.share} Compartilhar rotina</button>
        <button class="profile-action-btn danger" onclick="profileOpen=false;doLogout()">${I.logout} Sair da conta</button>
      </div>
    </div>
  </div>`;
}

function bindInputs(){
  const b=(id,cb)=>{const el=document.getElementById(id);if(el){el.addEventListener("input",e=>cb(e.target.value));return el;}};
  const n=b("ai-n",v=>nR.name=v);
  b("ai-d",v=>nR.dosage=v);b("ai-nt",v=>nR.note=v);
  if(n)n.focus();
  b("lf-n",v=>lf.name=v);
  const em=b("lf-e",v=>lf.email=v);
  b("lf-p",v=>lf.pass=v);
  if(em&&!document.getElementById("lf-n"))em.focus();
}

/* ══════════════════════════════════════════
   SMART TICK
   ══════════════════════════════════════════ */
setInterval(()=>{
  if(addOpen||loginOpen||drawer)return;
  const now=Date.now();
  R.forEach(r=>{
    const due=r.nextDose<=now,was=prevDue.has(r.id);
    if(due!==was){
      due?prevDue.add(r.id):prevDue.delete(r.id);
      if(due&&r.sound)playAlert();
      re();return;
    }
    if(tab!=="home")return;
    const el=document.querySelector(`[data-id="${r.id}"] .rcard-status`);
    if(el&&!due){const t="⏳ "+cd(r.nextDose-now);if(el.textContent!==t)el.textContent=t;}
    const pb=document.querySelector(`[data-id="${r.id}"] .prog-fill`);
    if(pb&&!due){const pct=Math.max(0,100-((r.nextDose-now)/((r.interval_hours||r.intervalHours)*36e5))*100);pb.style.width=pct+"%";}
  });
  const hv=document.querySelector(".hero-time-value");
  if(hv){const nx=[...R].sort((a,b)=>a.nextDose-b.nextDose)[0];if(nx&&nx.nextDose>now)hv.textContent=ft(nx.nextDose);}
},1000);

async function safeInit(){
  try{
    await init();
  }catch(e){
    console.error('PillFlow init error:',e);
    const root=document.getElementById('root');
    if(root)root.innerHTML='<div style="padding:40px 24px;color:#f2f5ff;font-family:Figtree,sans-serif;"><p style="font-size:18px;font-weight:700;margin-bottom:8px;">Erro ao iniciar</p><p style="font-size:13px;color:#7f8ea8;">'+e.message+'</p></div>';
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',safeInit);
}else{
  safeInit();
}
</script>
</body>
</html>
